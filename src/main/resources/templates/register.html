<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0C0604" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aktivasi Staf - Arabica Warehouse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body
    class="bg-[#0c0604] flex items-center justify-center min-h-screen p-4 font-sans text-white"
  >
    <div
      class="w-full max-w-md bg-[#1f100a]/50 p-8 rounded-3xl border border-white/10 shadow-2xl"
    >
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold">Aktivasi Karyawan</h2>
        <p class="text-xs text-gray-400 mt-1">
          Masukkan data diri dan Kode Perusahaan untuk menerima OTP.
        </p>
      </div>

      <div
        th:if="${error}"
        class="mb-4 bg-red-900/50 text-red-300 p-3 rounded-lg text-sm text-center"
      >
        <span th:text="${error}"></span>
      </div>

      <form th:action="@{/register/process}" method="POST" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1"
            >Nama Lengkap</label
          >
          <input
            type="text"
            name="fullName"
            required
            class="w-full bg-[#0c0604] border border-white/10 p-3 rounded-xl text-sm outline-none focus:border-[#B09874]"
          />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1"
            >Email Gmail Aktif</label
          >
          <input
            type="email"
            name="username"
            required
            class="w-full bg-[#0c0604] border border-white/10 p-3 rounded-xl text-sm outline-none focus:border-[#B09874]"
          />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1"
            >Password Akun</label
          >
          <input
            type="password"
            name="password"
            required
            class="w-full bg-[#0c0604] border border-white/10 p-3 rounded-xl text-sm outline-none focus:border-[#B09874]"
          />
        </div>
        <div>
          <label class="block text-xs font-semibold text-amber-500 mb-1"
            ><i class="fa-solid fa-lock mr-1"></i> Kode Rahasia
            Perusahaan</label
          >
          <input
            type="text"
            name="companyCode"
            required
            placeholder="Tanya admin gudang"
            class="w-full bg-[#0c0604] border border-amber-900/50 p-3 rounded-xl text-sm outline-none focus:border-amber-500 text-amber-500 font-mono"
          />
        </div>

        <button
          type="submit"
          class="w-full py-3.5 bg-[#8E704D] hover:bg-[#735238] font-bold rounded-xl mt-4 transition"
        >
          Kirim OTP ke Email
        </button>
        <a
          th:href="@{/}"
          class="block text-center text-xs text-gray-400 mt-4 hover:text-white"
          >Batal & Kembali ke Login</a
        >
      </form>
    </div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .then((reg) => console.log("ServiceWorker registered:", reg))
            .catch((err) =>
              console.error("ServiceWorker registration failed:", err),
            );
        });
      }
    </script>
  </body>
</html>
