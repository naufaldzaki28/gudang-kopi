<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0C0604" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ubah Akses Pegawai - Arabica.co</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-[#0c0604] text-gray-200 font-sans min-h-screen flex items-center justify-center p-4"
  >
    <div
      class="w-full max-w-md bg-gray-900/80 p-8 rounded-3xl border border-gray-800 shadow-xl"
    >
      <h2 class="text-2xl font-bold text-white mb-6">Ubah Akses Pegawai</h2>

      <form th:action="@{/users/edit/{id}(id=${userToEdit.id})}" method="post">
        <div class="mb-4">
          <label class="block text-sm text-gray-400 mb-1">Nama Lengkap</label>
          <input
            type="text"
            th:value="${userToEdit.fullName}"
            readonly
            class="w-full bg-gray-800 text-gray-500 rounded p-3 cursor-not-allowed outline-none border border-transparent"
          />
        </div>

        <div class="mb-4">
          <label class="block text-sm text-gray-400 mb-1"
            >Username (Email)</label
          >
          <input
            type="text"
            th:value="${userToEdit.username}"
            readonly
            class="w-full bg-gray-800 text-gray-500 rounded p-3 cursor-not-allowed outline-none border border-transparent"
          />
        </div>

        <div class="mb-8">
          <label class="block text-sm text-gray-200 mb-1"
            >Pilih Hak Akses Baru</label
          >
          <select
            name="role"
            class="w-full bg-[#1a100c] text-white rounded p-3 border border-gray-700 focus:border-yellow-600 outline-none"
          >
            <option value="STAFF" th:selected="${userToEdit.role == 'STAFF'}">
              Staff Gudang
            </option>
            <option value="ADMIN" th:selected="${userToEdit.role == 'ADMIN'}">
              Administrator
            </option>
          </select>
        </div>

        <div class="flex gap-3">
          <a
            th:href="@{/users}"
            class="w-full text-center bg-gray-700 hover:bg-gray-600 text-white py-3 rounded font-medium transition-colors"
            >Batal</a
          >
          <button
            type="submit"
            class="w-full bg-yellow-700 hover:bg-yellow-600 text-white py-3 rounded font-medium transition-colors"
          >
            Simpan Perubahan
          </button>
        </div>
      </form>
    </div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .then((reg) => console.log("ServiceWorker registered:", reg))
            .catch((err) =>
              console.error("ServiceWorker registration failed:", err),
            );
        });
      }
    </script>
  </body>
</html>
