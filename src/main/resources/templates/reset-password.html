<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0C0604" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - Arabica Warehouse</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-[#0c0604] flex items-center justify-center min-h-screen p-4 font-sans text-white"
  >
    <div
      class="w-full max-w-md bg-[#1f100a]/50 p-8 rounded-3xl border border-white/10 shadow-2xl"
    >
      <h2 class="text-2xl font-bold text-center mb-1">Buat Password Baru</h2>
      <p class="text-xs text-gray-400 text-center mb-6">
        Masukkan OTP yang dikirim ke
        <strong class="text-white" th:text="${email}"></strong>
      </p>

      <div
        th:if="${error}"
        class="mb-4 bg-red-900/50 text-red-300 p-3 rounded-lg text-sm text-center"
      >
        <span th:text="${error}"></span>
      </div>

      <form
        th:action="@{/reset-password/process}"
        method="POST"
        class="space-y-4"
      >
        <div>
          <label class="block text-xs font-semibold text-amber-500 mb-1"
            >Kode OTP (6 Digit)</label
          >
          <input
            type="text"
            name="otpCode"
            required
            maxlength="6"
            class="w-full bg-[#0c0604] border border-amber-900/50 p-3.5 rounded-xl text-center tracking-widest font-mono text-lg outline-none focus:border-amber-500 text-amber-500"
          />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1"
            >Password Baru</label
          >
          <input
            type="password"
            name="newPassword"
            required
            class="w-full bg-[#0c0604] border border-white/10 p-3.5 rounded-xl text-sm outline-none focus:border-[#B09874] text-white"
          />
        </div>
        <button
          type="submit"
          class="w-full py-3.5 bg-green-700 hover:bg-green-600 font-bold rounded-xl mt-4 transition shadow-lg shadow-green-900/30"
        >
          Simpan Password Baru
        </button>
      </form>
    </div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .then((reg) => console.log("ServiceWorker registered:", reg))
            .catch((err) =>
              console.error("ServiceWorker registration failed:", err),
            );
        });
      }
    </script>
  </body>
</html>
