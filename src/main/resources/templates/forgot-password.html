<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0C0604" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lupa Password - Arabica Warehouse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body
    class="bg-[#0c0604] flex items-center justify-center min-h-screen p-4 font-sans text-white"
  >
    <div
      class="w-full max-w-md bg-[#1f100a]/50 p-8 rounded-3xl border border-white/10 shadow-2xl text-center"
    >
      <div
        class="w-16 h-16 bg-amber-900/30 rounded-full flex items-center justify-center mx-auto mb-4 border border-amber-700/50"
      >
        <i class="fa-solid fa-key text-2xl text-amber-500"></i>
      </div>
      <h2 class="text-2xl font-bold">Lupa Password?</h2>
      <p class="text-xs text-gray-400 mt-2 mb-6">
        Masukkan email yang terdaftar. Kami akan mengirimkan 6 digit OTP untuk
        mereset password Anda.
      </p>

      <div
        th:if="${error}"
        class="mb-4 bg-red-900/50 text-red-300 p-3 rounded-lg text-sm text-center"
      >
        <span th:text="${error}"></span>
      </div>

      <form
        th:action="@{/forgot-password/process}"
        method="POST"
        class="space-y-4"
      >
        <div class="text-left">
          <label class="block text-xs font-semibold text-gray-400 mb-1"
            >Email Terdaftar</label
          >
          <input
            type="email"
            name="email"
            required
            placeholder="nama@gmail.com"
            class="w-full bg-[#0c0604] border border-white/10 p-3.5 rounded-xl text-sm outline-none focus:border-[#B09874] text-white"
          />
        </div>
        <button
          type="submit"
          class="w-full py-3.5 bg-gradient-to-r from-[#8E704D] to-[#5A3D2A] hover:opacity-90 font-bold rounded-xl mt-4 transition shadow-lg shadow-[#8E704D]/20"
        >
          Kirim OTP Reset
        </button>
        <a
          href="/login"
          class="block text-center text-xs text-gray-400 mt-5 hover:text-white"
          ><i class="fa-solid fa-arrow-left mr-1"></i> Kembali ke Login</a
        >
      </form>
    </div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .then((reg) => console.log("ServiceWorker registered:", reg))
            .catch((err) =>
              console.error("ServiceWorker registration failed:", err),
            );
        });
      }
    </script>
  </body>
</html>
